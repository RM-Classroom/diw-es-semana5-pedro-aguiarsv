<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Jiu-Jitsu - História e Rankings</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">
    <header class="main-header">
        <div class="logo">LOGO / TÍTULO</div>
    </header>

    <aside class="sidebar-left">
        <nav>
            <button class="nav-btn">Adicionar atletas</button>
            <button class="nav-btn">Adicionar campeonato</button>
            <button class="nav-btn">Todos os atletas</button>
            <button class="nav-btn">Ranking de atletas</button>
            <button class="nav-btn">Ranking de academias</button>
        </nav>
    </aside>

    <main class="main-content">
        <section class="carrossel-section">
            <div class="carrossel-box">
                <h2>Carrossel dos atletas mais famosos</h2>
            </div>
        </section>

        <section class="campeonatos-section">
            <div class="campeonatos-row">
                <div class="camp-item">Principais campeonatos</div>
                <div class="camp-item">Principais campeonatos</div>
                <div class="camp-item">Principais campeonatos</div>
            </div>
        </section>

        <section class="rankings-grid">
            <div class="rank-card">
                <div class="rank-content">Top 5 Masculino Adulto Preta</div>
                <button class="view-all">Ver todos</button>
            </div>
            <div class="rank-card">
                <div class="rank-content">Top 5 Feminino Adulto Preta</div>
                <button class="view-all">Ver todos</button>
            </div>
        </section>
    </main>

    <aside class="sidebar-right">
        <div class="search-box">
            <span>Buscar atletas</span>
        </div>
        <div class="calendario-box">
            <h3>Calendário de campeonatos</h3>
            </div>
    </aside>
</div>

</body>
</html>
